<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta name="color-scheme" content="dark" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ALWAFER · Link Manager</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230a0a0c'/%3E%3Ctext x='50%25' y='54%25' font-size='34' font-family='Georgia,serif' fill='%23d4af37' text-anchor='middle' dominant-baseline='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-aura" aria-hidden="true"></div>

  <!-- ===================== LOGIN ===================== -->
  <section id="login-view" class="view login-view">
    <form id="login-form" class="login-card" autocomplete="on">
      <div class="logo-mark">A</div>
      <h1 class="brand-title">ALWAFER</h1>
      <p class="brand-sub">Link Manager</p>
      <label class="field">
        <span class="field-label">Password</span>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" id="login-btn" class="btn btn-primary">Sign in</button>
      <p id="login-msg" class="form-msg" role="alert"></p>
    </form>
  </section>

  <!-- ===================== EDITOR ===================== -->
  <section id="editor-view" class="view editor-view" hidden>
    <header class="admin-header">
      <div class="brand-row">
        <span class="logo-mark sm">A</span>
        <span class="brand-title sm">ALWAFER</span>
        <span class="brand-tag">Link Manager</span>
      </div>
      <button id="logout-btn" class="btn btn-ghost">Sign out</button>
    </header>

    <p class="lead">Choose a page, then turn links on or off and paste their web addresses. Region links are shared across all pages.</p>

    <nav id="profile-tabs" class="tabs" aria-label="Pages"></nav>

    <main class="editor">
      <h2 class="section-title" id="links-title">Page links</h2>
      <div id="links-editor" class="rows"></div>

      <h2 class="section-title">Agency Regions <span class="muted">(shared on every page)</span></h2>
      <div id="regions-editor" class="rows"></div>
    </main>

    <div class="action-bar">
      <button id="save-btn" class="btn btn-primary">Save changes</button>
      <button id="reset-btn" class="btn btn-ghost">Discard changes</button>
      <span class="spacer"></span>
      <button id="export-btn" class="btn btn-ghost">Export backup</button>
      <button id="import-btn" class="btn btn-ghost">Import backup</button>
      <input type="file" id="import-file" accept="application/json,.json" hidden />
    </div>

    <div class="preview-bar">
      <span class="preview-label">Open a page:</span>
      <a class="preview-link" href="/?profile=mustafa" target="_blank" rel="noopener noreferrer" data-preview="mustafa">ALWAFER</a>
      <a class="preview-link" href="/?profile=ahmed" target="_blank" rel="noopener noreferrer" data-preview="ahmed">Team Ahmed Ramadan</a>
      <a class="preview-link" href="/?profile=hala" target="_blank" rel="noopener noreferrer" data-preview="hala">Hala Al-Saghir</a>
    </div>
  </section>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script src="admin.js"></script>
</body>
</html>
